<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Тиражи — CRUD</title>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      color: #000;
      background-color: #fff;
      font-size: 18px;
    }

    .sidebar {
      width: 220px;
      background-color: #fff;
      padding-top: 20px;
      border-right: 1px solid #ccc;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px;
      text-decoration: none;
      color: #000;
      border-radius: 4px;
      transition: background-color 0.2s;
    }

    .sidebar a:hover { background-color: #eee; }
    .sidebar i { width: 20px; text-align: center; }

    .main-content { flex-grow: 1; display: flex; flex-direction: column; }

    .topbar {
      background-color: #fff;
      padding: 10px;
      border-bottom: 1px solid #ccc;
      display: flex;
      gap: 20px;
    }

    .topbar button {
      flex: 1;
      padding: 12px 0;
      border: none;
      background: transparent;
      cursor: pointer;
      transition: background-color 0.2s;
      font-size: 18px;
    }

    .topbar button:hover { background: #eee; }

    .content-container {
      flex-grow: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 18px;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #000;
      padding: 10px;
      text-align: left;
    }

    th { background: #f9f9f9; }

    .pagination {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-top: 10px;
      gap: 10px;
      width: 100%;
    }

    .pagination input {
      width: 60px;
      padding: 6px;
      border: 1px solid #000;
      font-size: 18px;
    }

    .pagination button {
      padding: 8px 14px;
      border: none;
      background: transparent;
      cursor: pointer;
      transition: background-color 0.2s;
      font-size: 18px;
    }

    .pagination button:hover { background: #eee; }

    form {
      display: flex;
      flex-wrap: wrap;
      gap: 20px 40px;
      justify-content: center;
      margin-top: 20px;
      max-width: 1000px;
      width: 100%;
    }

    form input, form select {
      flex: 1 1 300px;
      min-width: 250px;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #000;
      border-radius: 4px;
    }

    form button {
      flex-basis: 100%;
      padding: 12px;
      font-size: 18px;
      border: none;
      background: #eee;
      cursor: pointer;
      transition: background-color 0.2s;
      border-radius: 4px;
    }

    form button:hover { background: #ddd; }
  </style>
  <script>
    const BASE_URL = "/Circulation";

    /**
     * Сериализует данные формы в объект JSON.
     * Обрабатывает пустые значения в зависимости от типа формы:
     * - Search/Delete: пустые числовые поля получают значение -1.
     * - Create/Update: пустые поля игнорируются (не включаются в объект данных),
     * если только они не обязательны (required), но это должно контролироваться HTML.
     */
    function serializeForm(formId, isSearchOrDelete = false) {
      const form = document.getElementById(formId);
      const data = {};

      form.querySelectorAll("input, select").forEach(input => {
        let value = input.value;
        const name = input.name;

        // 1. Если поле НЕ пустое: преобразуем к типу и добавляем.
        if (value !== "" && value != null) {
          if (input.type === "number") {
            data[name] = Number(value);
          } else {
            data[name] = value;
          }
          return;
        }

        // 2. Если поле ПУСТОЕ
        if (isSearchOrDelete) {
          // Для Search и Delete: применяем дефолты
          if (input.type === "number") {
            data[name] = -1; // -1 для числовых ID и количества
          } else {
            data[name] = "";
          }
        } else {
          // Для Create и Update: пропускаем пустые поля (не добавляем в data)
          return;
        }
      });

      return data;
    }


    function showSection(section) {
      const sections = ["search-form","create-form","update-form","delete-form","table-section"];
      sections.forEach(s => document.getElementById(s).style.display="none");

      if(section==="read"){
        document.getElementById("search-form").style.display="flex";
        loadPage(1);
      }
      else if(section==="create") document.getElementById("create-form").style.display="flex";
      else if(section==="update") document.getElementById("update-form").style.display="flex";
      else if(section==="delete") document.getElementById("delete-form").style.display="flex";
    }

    async function search(event){
      event.preventDefault();
      const data = serializeForm("search-form", true);
      loadPage(1, data);
    }

    async function loadPage(page=1, formData = null){
      const amountOnPage=10;
      const data = formData || serializeForm("search-form", true); // Используем дефолты для поиска
      const url = `${BASE_URL}/search/${page}?amountOnPage=${amountOnPage}`;
      try {
        const response = await fetch(url, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(data)
        });
        const result = await response.json();
        renderTable(result);
        document.getElementById("table-section").style.display="block";
        document.getElementById("page-number").value=page;
      } catch(e) {
        alert("Ошибка сети: " + e.message);
      }
    }

    function renderTable(data){
      const head = document.getElementById("table-head");
      const body = document.getElementById("table-body");
      head.innerHTML = "";
      body.innerHTML = "";

      if(data.length === 0){
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 4;
        td.textContent = "Нет данных";
        td.style.textAlign = "center";
        tr.appendChild(td);
        body.appendChild(tr);
        return;
      }

      const headerRow = document.createElement("tr");
      ["ID издания", "Тираж", "Распределено", "№ выпуска"].forEach(txt => {
        const th = document.createElement("th");
        th.textContent = txt;
        headerRow.appendChild(th);
      });
      head.appendChild(headerRow);

      data.forEach(r => {
        const tr = document.createElement("tr");
        [
          r.pubId,
          r.amount,
          r.allocatedAmount,
          r.numOfPub
        ].forEach(v => {
          const td = document.createElement("td");
          td.textContent = v;
          tr.appendChild(td);
        });
        body.appendChild(tr);
      });
    }

    async function submitForm(formId, endpoint){
      // Для Create/Update: isSearchOrDelete = false. Для Delete: isSearchOrDelete = true.
      const isSearchOrDelete = (endpoint === "delete");
      const data = serializeForm(formId, isSearchOrDelete);

      let method = "POST";
      if(endpoint === "update") method = "PUT";
      else if(endpoint === "delete") method = "DELETE";

      const url = `${BASE_URL}/${endpoint}`;
      try {
        const response = await fetch(url, {
          method,
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(data)
        });
        if(response.ok || response.status === 204){
          alert("Операция выполнена успешно!");
          document.getElementById(formId).reset();
          showSection("read");
        } else {
          const error = await response.text();
          alert("Ошибка: " + (error || response.status));
        }
      } catch(e) {
        alert("Ошибка сети: " + e.message);
      }
    }

    function loadPageNumber(){
      const page = parseInt(document.getElementById("page-number").value) || 1;
      if(page > 0) loadPage(page);
    }

    window.onload = () => showSection("read");
  </script>
</head>
<body>
<div class="sidebar">
  <a th:href="@{/}"><i class="fa-solid fa-house"></i> Главная</a>
  <a th:href="@{/Employees/}"><i class="fa-solid fa-users"></i> Сотрудники</a>
  <a th:href="@{/History/}"><i class="fa-solid fa-clock-rotate-left"></i> История</a>
  <a th:href="@{/Subscription/}"><i class="fa-solid fa-envelope-open-text"></i> Подписки</a>
  <a th:href="@{/Delivery/}"><i class="fa-solid fa-truck"></i> Доставка</a>
  <a th:href="@{/Printing/}"><i class="fa-solid fa-newspaper"></i> Печатные издания</a>
  <a th:href="@{/Circulation/}"><i class="fa-solid fa-print"></i> Тиражи</a>
  <a th:href="@{/Departments/}"><i class="fa-solid fa-building"></i> Подразделения</a>
</div>

<div class="main-content">
  <div class="topbar">
    <button onclick="showSection('create')"><i class="fa-solid fa-plus"></i> Добавить</button>
    <button onclick="showSection('read')"><i class="fa-solid fa-eye"></i> Читать</button>
    <button onclick="showSection('update')"><i class="fa-solid fa-pen"></i> Обновить</button>
    <button onclick="showSection('delete')"><i class="fa-solid fa-trash"></i> Удалить</button>
  </div>

  <div class="content-container">
    <form id="search-form" style="display:none" onsubmit="search(event)">
      <input type="number" name="pubId" placeholder="ID издания" min="-1">
      <input type="number" name="amount" placeholder="Тираж" min="-1">

      <input type="number" name="numOfPub" placeholder="№ выпуска" min="-1">
      <button type="submit">Поиск</button>
    </form>

    <div id="table-section" style="display:none; width:100%">
      <table>
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
      <div class="pagination">
        <label>Страница: <input type="number" id="page-number" value="1" min="1"></label>
        <button onclick="loadPageNumber()">Загрузить</button>
      </div>
    </div>

    <form id="create-form" style="display:none" onsubmit="event.preventDefault(); submitForm('create-form','create')">
      <input type="number" name="pubId" placeholder="ID издания" min="1" required>
      <input type="number" name="amount" placeholder="Тираж" min="1" required>

      <input type="number" name="numOfPub" placeholder="№ выпуска" min="1" required>
      <button type="submit">Создать</button>
    </form>

    <form id="update-form" style="display:none" onsubmit="event.preventDefault(); submitForm('update-form','update')">
      <input type="number" name="pubId" placeholder="ID издания (обязателен)" min="1" required>
      <input type="number" name="numOfPub" placeholder="№ выпуска (обязателен)" min="1" required>
      <input type="number" name="amount" placeholder="Новый тираж" min="-1">

      <button type="submit">Обновить</button>
    </form>

    <form id="delete-form" style="display:none" onsubmit="event.preventDefault(); submitForm('delete-form','delete')">
      <input type="number" name="pubId" placeholder="ID издания">
      <input type="number" name="amount" placeholder="Тираж" min="-1">

      <input type="number" name="numOfPub" placeholder="№ выпуска" min="-1">
      <button type="submit">Удалить</button>
    </form>
  </div>
</div>
</body>
</html>
