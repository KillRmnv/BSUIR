<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Subscription CRUD</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { margin:0; font-family:Arial,sans-serif; display:flex; height:100vh; color:#000; background-color:#fff; font-size:18px; }
    .sidebar { width:200px; background-color:#fff; padding-top:20px; border-right:1px solid #ccc; display:flex; flex-direction:column; gap:15px; }
    .sidebar a { display:flex; align-items:center; gap:10px; padding:14px; text-decoration:none; color:#000; border-radius:4px; transition:0.2s; }
    .sidebar a:hover { background-color:#eee; }
    .sidebar i { width:20px; text-align:center; }
    .main-content { flex-grow:1; display:flex; flex-direction:column; }
    .topbar { background-color:#fff; padding:10px; border-bottom:1px solid #ccc; display:flex; gap:20px; }
    .topbar button { flex:1; padding:12px 0; border:none; background:transparent; cursor:pointer; transition:0.2s; font-size:18px; }
    .topbar button:hover { background:#eee; }
    .content-container { flex-grow:1; padding:20px; display:flex; flex-direction:column; align-items:center; }
    table { border-collapse:collapse; width:100%; font-size:18px; margin-top:20px; }
    th, td { border:1px solid #000; padding:10px; text-align:left; }
    th { background:#f9f9f9; }
    .pagination { display:flex; justify-content:flex-end; align-items:center; margin-top:10px; gap:10px; width:100%; }
    .pagination input { width:60px; padding:6px; border:1px solid #000; font-size:18px; }
    .pagination button { padding:8px 14px; border:none; background:transparent; cursor:pointer; transition:0.2s; font-size:18px; }
    .pagination button:hover { background:#eee; }
    form { display:flex; flex-wrap:wrap; gap:20px 40px; justify-content:center; margin-top:20px; max-width:1000px; }
    form input, form select { flex:1 1 300px; min-width:250px; padding:10px; font-size:16px; border:1px solid #000; border-radius:4px; }
    form button { flex-basis:100%; padding:12px; font-size:18px; border:none; background:#eee; cursor:pointer; transition:0.2s; border-radius:4px; }
    form button:hover { background:#ddd; }
  </style>
  <script>
    const BASE_URL="/Subscription";

    function showSection(section){
      ["table-section","create-form","update-form","delete-form","search-form"].forEach(id=>document.getElementById(id).style.display="none");
      if(section==="read") {
        document.getElementById("search-form").style.display="flex";
        loadSubscriptionsPage(1);
      }
      else if(section==="create") document.getElementById("create-form").style.display="flex";
      else if(section==="update") document.getElementById("update-form").style.display="flex";
      else if(section==="delete") document.getElementById("delete-form").style.display="flex";
    }

    // Универсальная сериализация: пустые поля → дефолты (кроме create)
    function serializeForm(formId, includeDefaults = true){
      const form = document.getElementById(formId);
      const data = {};
      form.querySelectorAll("input, select").forEach(input => {
        let value = input.value;
        const name = input.name;

        // Если поле НЕ пустое — возвращаем как есть (и преобразуем в число, если нужно)
        if (value !== "" && value != null) {
          if (input.type === "number" || input.tagName === "SELECT") {
            data[name] = Number(value);
          } else {
            data[name] = value;
          }
          return;
        }

        // Поле ПУСТОЕ
        if (includeDefaults) {
          // Для поиска, обновления, удаления: устанавливаем дефолты
          if (input.type === "number" || input.tagName === "SELECT") {
            data[name] = -1; // Дефолт для чисел и select
          } else if (input.type === "date") {
            data[name] = null; // Дефолт для дат
          } else {
            data[name] = ""; // Дефолт для всех остальных строк
          }
        } else {
          // Для create — не отправляем пустые поля
          // (Убедимся, что undefined не добавляется в финальный объект data)
        }
      });
      console.log("Serialized", formId, data);
      return data;
    }

    async function searchSubscriptions(event){
      event.preventDefault();
      const data = serializeForm("search-form", true);
      loadSubscriptionsPage(1, data);
    }

    async function loadSubscriptionsPage(page=1, formData=null){
      const data = formData || serializeForm("search-form", true);
      const url = `${BASE_URL}/search/${page}?amountOnPage=10`;
      const resp = await fetch(url, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
      });
      const json = await resp.json();
      renderTable(json);
      document.getElementById("table-section").style.display = "block";
      document.getElementById("page-number").value = page;
    }

    function renderTable(data){
      const head = document.getElementById("table-head"), body = document.getElementById("table-body");
      head.innerHTML=""; body.innerHTML="";
      if(data.length===0){
        const tr=document.createElement("tr");
        const td=document.createElement("td"); td.colSpan=7; td.style.textAlign="center"; td.textContent="Нет данных"; tr.appendChild(td); body.appendChild(tr);
        return;
      }
      const headerRow=document.createElement("tr");
      ["ID","Дата начала","Дата окончания","Период","Издание","Сотрудник","Стоимость"].forEach(h=>{
        const th=document.createElement("th"); th.textContent=h; headerRow.appendChild(th);
      });
      head.appendChild(headerRow);
      data.forEach(r=>{
        const tr=document.createElement("tr");
        [r.id,
          r.startingDate||"-",
          r.endingDate||"-",
          r.period||"-",
          r.printing?.index||"-",
          r.employeeId||"-",
          r.cost||"-"].forEach(v=>{
          const td=document.createElement("td"); td.textContent=v; tr.appendChild(td);
        });
        body.appendChild(tr);
      });
    }

    async function submitForm(formId, endpoint){
      const includeDefaults = formId !== "create-form";
      const data = serializeForm(formId, includeDefaults);

      let method = "POST";
      if(endpoint==="update") method="PUT";
      else if(endpoint==="delete") method="DELETE";

      try{
        const resp = await fetch(`${BASE_URL}/${endpoint}`, {
          method,
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(data)
        });
        if(resp.ok || resp.status === 204){
          alert("Операция выполнена");
          document.getElementById(formId).reset();
          showSection("read");
          loadSubscriptionsPage(1);
        } else {
          const error = await resp.text();
          alert("Ошибка: " + (error || resp.status));
        }
      } catch(e){
        alert("Ошибка сети: " + e.message);
      }
    }

    function loadPage(){
      const page = parseInt(document.getElementById("page-number").value) || 1;
      if(page > 0) loadSubscriptionsPage(page);
    }

    window.onload = () => {
      showSection("read");
      loadSubscriptionsPage(1);
    };
  </script>
</head>
<body>
<div class="sidebar">
  <a th:href="@{/}"><i class="fa-solid fa-house"></i> Главная</a>
  <a th:href="@{/Employees/}"><i class="fa-solid fa-users"></i> Сотрудники</a>
  <a th:href="@{/History/}"><i class="fa-solid fa-clock-rotate-left"></i> История</a>
  <a th:href="@{/Subscription/}"><i class="fa-solid fa-envelope-open-text"></i> Подписки</a>
  <a th:href="@{/Delivery/}"><i class="fa-solid fa-truck"></i> Доставка</a>
  <a th:href="@{/Printing/}"><i class="fa-solid fa-newspaper"></i> Печатные издания</a>
  <a th:href="@{/Circulation/}"><i class="fa-solid fa-print"></i> Тиражи</a>
  <a th:href="@{/Departments/}"><i class="fa-solid fa-building"></i> Подразделения</a>
</div>

<div class="main-content">
  <div class="topbar">
    <button onclick="showSection('create')"><i class="fa-solid fa-plus"></i> Добавить</button>
    <button onclick="showSection('read')"><i class="fa-solid fa-eye"></i> Читать</button>
    <button onclick="showSection('update')"><i class="fa-solid fa-pen"></i> Обновить</button>
    <button onclick="showSection('delete')"><i class="fa-solid fa-trash"></i> Удалить</button>
  </div>

  <div class="content-container">
    <form id="search-form" style="display:none" onsubmit="searchSubscriptions(event)">
      <input type="date" name="startingDate" placeholder="Дата начала">
      <input type="date" name="endingDate" placeholder="Дата окончания">
      <input type="number" name="printing" placeholder="Издание">
      <select name="period">
        <option value="">Период</option>
        <option th:each="p:${reference}" th:value="${p.freq_id}" th:text="${p.freq_name}"></option>
      </select>
      <input type="number" name="employeeId" placeholder="Сотрудник (ID)">
      <input type="number" name="cost" placeholder="Стоимость">
      <button type="submit">Поиск</button>
    </form>

    <div id="table-section" style="display:none; width:100%">
      <table>
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
      <div class="pagination">
        <label>Страница: <input type="number" id="page-number" value="1" min="1"></label>
        <button onclick="loadPage()">Загрузить</button>
      </div>
    </div>

    <form id="create-form" style="display:none" onsubmit="event.preventDefault(); submitForm('create-form','create')">
      <input type="date" name="startingDate" placeholder="Дата начала" required>
      <input type="number" name="printing" placeholder="Издание" required>
      <select name="period" required>
        <option value="">Период</option>
        <option th:each="p:${reference}" th:value="${p.freq_id}" th:text="${p.freq_name}"></option>
      </select>
      <input type="number" name="employeeId" placeholder="Сотрудник (ID)" required>
      <input type="number" name="cost" placeholder="Стоимость" required>
      <button type="submit">Создать</button>
    </form>

    <form id="update-form" style="display:none" onsubmit="event.preventDefault(); submitForm('update-form','update')">
      <input type="number" name="id" placeholder="ID" required>
      <input type="date" name="startingDate" placeholder="Дата начала">
      <input type="number" name="printing" placeholder="Издание">
      <select name="period">
        <option value="">Не менять</option>
        <option th:each="p:${reference}" th:value="${p.freq_id}" th:text="${p.freq_name}"></option>
      </select>
      <input type="number" name="employeeId" placeholder="Сотрудник (ID)">
      <input type="number" name="cost" placeholder="Стоимость">
      <button type="submit">Обновить</button>
    </form>

    <form id="delete-form" style="display:none" onsubmit="event.preventDefault(); submitForm('delete-form','delete')">
      <input type="number" name="id" placeholder="ID">
      <input type="date" name="startingDate" placeholder="Дата начала">
      <input type="date" name="endingDate" placeholder="Дата окончания">
      <input type="number" name="printing" placeholder="Издание">
      <select name="period">
        <option value="">Любой</option>
        <option th:each="p:${reference}" th:value="${p.freq_id}" th:text="${p.freq_name}"></option>
      </select>
      <input type="number" name="employeeId" placeholder="Сотрудник (ID)">
      <input type="number" name="cost" placeholder="Стоимость">
      <button type="submit">Удалить</button>
    </form>
  </div>
</div>
</body>
</html>
